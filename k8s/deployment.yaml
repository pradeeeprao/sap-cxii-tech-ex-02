apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  labels:
    app.kubernetes.io/name: orders-api
spec:
  # SQLite + a ReadWriteOnce PVC is intentionally a single-writer deployment.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: seed-orders
          # Replace with the immutable registry digest used by your environment.
          image: orders-api:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              if [ ! -f /data/orders.db ]; then
                cp /app/seed/orders.db /data/orders.db
              fi
              if [ ! -f /data/orders-index.npz ]; then
                cp /app/seed/orders-index.npz /data/orders-index.npz
              fi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: orders-data
              mountPath: /data
      containers:
        - name: api
          image: orders-api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: orders-api-config
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: orders-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: orders-data
          persistentVolumeClaim:
            claimName: orders-data
        - name: tmp
          emptyDir: {}
